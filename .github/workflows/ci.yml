name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "screenshots/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "screenshots/**"

jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Run Prettier check
        run: npx prettier --check .
  lint:
    runs-on: ubuntu-latest
    needs: prettier
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm ci --prefix client

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Run ESLint
        run: npx eslint . --max-warnings 0
  typecheck:
    runs-on: ubuntu-latest
    needs: prettier
    strategy:
      matrix:
        workspace: [client, server]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefix ${{ matrix.workspace }}

      - name: Run TypeScript check
        run: npx tsc --noEmit --project ${{ matrix.workspace }}/tsconfig.json
